---
- hosts: k3s_cluster
  become: yes
  roles:
    - role: system/essential

- hosts: master
  become: yes
  roles:
    - role: system/nfs/server

- hosts: master
  become: no
  vars_files:
    - ./secrets/secrets.var
  roles:
    - role: deploy/system/openshift
    - role: andrewrothstein.kubernetes-helm
    - role: deploy/system/helm_repo
    - role: deploy/system/metallb
    - role: deploy/system/nfs/provisioner
    - role: deploy/system/cert_manager
    - role: deploy/system/get_cert
    - role: deploy/system/traefik
    - role: deploy/system/digitalocean_dyndns
    - role: deploy/system/traefik-ext
    - role: deploy/system/kube_dashboard
