alertmanager:
  ingress:
    enabled: false
  persistentVolume:
    enabled: true
    accessModes:
      - ReadWriteOnce
    #existingClaim: ""
    size: 2Gi
    storageClass: "nfs-client"

kubeStateMetrics:
  enabled: false

server:
  enabled: true
  persistentVolume:
    enabled: true
    accessModes:
      - ReadWriteOnce
    #existingClaim: ""
    mountPath: /data
    size: 8Gi
    storageClass: "nfs-client"
    # volumeBindingMode: ""
    subPath: ""
  statefulSet:
    enabled: true

pushgateway:
  enabled: false
  persistentVolume:
    enabled: true
    # existingClaim: ""
    storageClass: "nfs-client"
