---
# Default values for authelia.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
replicaCount: 1

image:
  repository: authelia/authelia
  tag: 4
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

authelia:
  logLevel: {{ authelia.enabled }}
  redirectionURL: {{ authelia.enabled }}
  totpIssuer: {{ authelia.enabled }}

  duo:
    enabled: {{ duo.enabled }}
    config:
      hostname: {{ duo.hostname }}
      integration_key: {{ duo.integration_key }}

  ldap:
    enabled: {{ ldap.enabled }}
    config:
      url: {{ ldap.url }}
      # The base dn for every entries
      base_dn: {{ ldap.base_dn }}
      # An additional dn to define the scope to all users
      additional_users_dn: ou=users
      # The users filter used to find the user DN
      # {0} is a matcher replaced by username.
      # 'cn={0}' by default.
      users_filter: cn={0}
      # An additional dn to define the scope of groups
      additional_groups_dn: ou=groups
      # The groups filter used for retrieving groups of a given user.
      # {0} is a matcher replaced by username.
      # {dn} is a matcher replaced by user DN.
      # {uid} is a matcher replaced by user uid.
      # 'member={dn}' by default.
      groups_filter: (&(member={dn})(objectclass=groupOfNames))
      # The attribute holding the name of the group
      group_name_attribute: cn
      # The attribute holding the mail address of the user
      mail_attribute: mail
      # The username and password of the admin user.
      user: {{ ldap.user }}

    # If LDAP is disabled, you can specify a users database file, however
    # it will be read-only!
  fileAuth:
    users: {{ fileauth.users }}

  # Default policy can either be `bypass`, `one_factor`, `two_factor` or `deny`.
  # It is the policy applied to any resource if there is no policy to be applied
  # to the user.
  accessControl:
    defaultPolicy: deny
    rules: {{ accessControl.rules }}

  session:
    # The name of the session cookie. (default: authelia_session).
    name: {{ session.name }}
    # The time in ms before the cookie expires and session is reset.
    expiration: 3600000 # 1 hour
    # The inactivity time in ms before the session is reset.
    inactivity: 300000 # 5 minutes
    # The domain to protect.
    # Note: the authenticator must also be in that domain. If empty, the cookie
    # is restricted to the subdomain of the issuer.
    domain: {{ dns_domains }}

  regulation:
    # The number of failed login attempts before user is banned.
    # Set it to 0 to disable regulation.
    max_retries: 3
    # The time range during which the user can attempt login before being banned.
    # The user is banned if the authentication failed `max_retries` times in a `find_time` seconds window.
    find_time: 120
    # The length of time before a banned user can login again.
    ban_time: 300

  notifier:
  # You can disable the notifier startup check by setting this to true.
    smtpenabled: {{ notifier.smtp.enabled }}

  # For testing purpose, notifications can be sent in a file
    filesystem:
      filename: /config/notification.txt

    # Use a SMTP server for sending notifications
    smtp:
      username: {{ notifier.smtp.username }}
      secure: {{ notifier.smtp.secure }}
      host: {{ notifier.smtp.host }}
      port: {{ notifier.smtp.port }}
      sender: {{ notifier.smtp.sender }}

# Options for Authelia PVC (/var/lib/authelia/store) when not using external DB
persistence:
  annotations: {}
  ## Persistent Volume Storage Class
  ## If defined, storageClassName: <storageClass>
  ## If set to "-", storageClassName: "", which disables dynamic provisioning
  ## If undefined (the default) or set to null, no storageClassName spec is
  ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
  ##   GKE, AWS & OpenStack)
  ##
  # storageClass: "-"

  ## A manually managed Persistent Volume and Claim
  ## Requires persistence.enabled: true
  ## If defined, PVC must be created manually before volume will be bound
  # existingClaim:

  accessMode: ReadWriteOnce
  size: 100Mi

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name:

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths: []

  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

secrets:
  jwt_secret: {{ authelia_jwt }}
  session_secret: {{ authelia_session }}
  duo_secret_key: {{ authelia_duo }}
  redis_password: {{ authelia_session }}
  DBPassword: {{ dbuser_password }}
  LDAP_password: {{ ldap_password }}
  smtp_password: {{ email_password }}

redis:
  enabled: {{ redis.enabled }}
  host: {{ redis.host }}
  port: 6379
  database_index: {{ redis.dbindex }}

externaldb:
  enabled: {{ externaldb.enabled }}
  DBType: {{ externaldb.type }}
  DBURL: {{ externaldb.url }}
  Database: {{ externaldb.database_name }}
  DBUser: {{ externaldb.user }}
