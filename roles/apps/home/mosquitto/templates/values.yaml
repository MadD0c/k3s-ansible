---
serviceAccount:
  create: true
service:
  type: LoadBalancer
  loadBalancerIP: "192.168.1.222"
persistence:
  enabled: true
  storageClass: nfs-client
  size: 1Gi

# Any extra volumes to define for the pod
extraVolumes: []
    - name: mqttauth
      secret:
        secretName: mosquitto-auth-secrets

# Any extra volume mounts to define for the containers
extraVolumeMounts: []
    - name: mqttauth
      mountPath: "/mosquitto/config/passwords.txt"
      subPath: passwords.txt

monitoring:
  podMonitor:
    enabled: true
  sidecar:
    enabled: true
