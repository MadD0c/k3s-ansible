# upgrade strategy type (e.g. Recreate or RollingUpdate)
strategyType: Recreate

image:
  repository: adguard/adguardhome
  # Image tag is set via charts appVersion. If you want to override the tag, specify it here
  # tag: vX.Y.Z
  pullPolicy: IfNotPresent

probes:
  liveness:
    enabled: true
    initialDelaySeconds: 5
    failureThreshold: 5
    periodSeconds: 10
  readiness:
    enabled: true
    initialDelaySeconds: 5
    failureThreshold: 5
    periodSeconds: 10
  startup:
    enabled: true
    initialDelaySeconds: 5
    failureThreshold: 30
    periodSeconds: 10

service:
  type: LoadBalancer
  # externalTrafficPolicy: Local
  # externalIPs: []
  loadBalancerIP: "192.168.1.211"
    # a fixed LoadBalancer IP
  # loadBalancerSourceRanges: []
  annotations: {}
     metallb.universe.tf/address-pool: network-services
     metallb.universe.tf/allow-shared-ip: adguard-home-svc

serviceTCP:
  enabled: true
  type: NodePort
  # externalTrafficPolicy: Local
  # externalIPs: []
  loadBalancerIP: "192.168.1.211"
    # a fixed LoadBalancer IP
  # loadBalancerSourceRanges: []
  annotations: {}
     metallb.universe.tf/address-pool: network-services
     metallb.universe.tf/allow-shared-ip: adguard-home-svc

serviceUDP:
  enabled: true
  type: LoadBalancer
  # externalTrafficPolicy: Local
  # externalIPs: []
  loadBalancerIP: "192.168.1.211"
    # a fixed LoadBalancer IP
  # loadBalancerSourceRanges: []
  annotations: {}
     metallb.universe.tf/address-pool: network-services
     metallb.universe.tf/allow-shared-ip: adguard-home-svc

serviceMonitor:
  enabled: true
  additionalLabels: {}

## Pod Annotations
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "api"

persistence:
  config:
    enabled: true
    ## adguard-home configuration data Persistent Volume Storage Class
    ## If defined, storageClassName: <storageClass>
    ## If set to "-", storageClassName: "", which disables dynamic provisioning
    ## If undefined (the default) or set to null, no storageClassName spec is
    ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
    ##   GKE, AWS & OpenStack)
    ##
    storageClass: "nfs-client"
    ##
    ## If you want to reuse an existing claim, you can pass the name of the PVC using
    ## the existingClaim variable
    # existingClaim: your-claim
    # subPath: some-subpath
    accessMode: ReadWriteOnce
    size: 20Mi
    ## Do not delete the pvc upon helm uninstall
    skipuninstall: false
  work:
    enabled: true
    ## adguard-home work volume configuration
    ## If defined, storageClassName: <storageClass>
    ## If set to "-", storageClassName: "", which disables dynamic provisioning
    ## If undefined (the default) or set to null, no storageClassName spec is
    ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
    ##   GKE, AWS & OpenStack)
    ##
    storageClass: "nfs-client"
    ##
    ## If you want to reuse an existing claim, you can pass the name of the PVC using
    ## the existingClaim variable
    # existingClaim: your-claim
    # subPath: some-subpath
    accessMode: ReadWriteOnce
    size: 2Gi
    ## Do not delete the pvc upon helm uninstall
    skipuninstall: false
