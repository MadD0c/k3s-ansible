---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: certissuer-prod
spec:
  acme:
    email: at.mccann@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: production-issuer-account-key
    solvers:
    - dns01:
        digitalocean:
          tokenSecretRef:
            name: digitalocean-dns
            key: access-token
      selector:
        dnsNames:
        - 'mccannclan.family'
        - '*.mccannclan.family'
