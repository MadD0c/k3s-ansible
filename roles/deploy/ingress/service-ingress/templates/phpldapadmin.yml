---

apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: ingressroute-phpldapadmin
  namespace: default
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`{{ prefex_phpldapadmin }}.{{ dns_domains }}`)
      kind: Rule
      services:
        - name: phpldapadmin
          namespace: auth
          port: 80
      middlewares:
        - chain-authelia
      #  - chain-basic-auth
      #  - chain-no-auth
  tls:
    store:
      name: default
