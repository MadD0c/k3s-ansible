---

apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: ingressroute-guacamole
  namespace: default
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`{{ prefex_guacamole }}.{{ dns_domains }}`)
      kind: Rule
      services:
        - name: guacamole
          namespace: monitor
          port: 80
      middlewares:
        - chain-authelia
        #- chain-basic-auth
        #- chain-no-auth
  tls:
    store:
      name: default
