---

apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: ingressroute-prometheus
  namespace: default
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`prom.mccannclan.family`)
      kind: Rule
      services:
        - name: prometheus-server
          namespace: monitor
          port: 9090
  #  middlewares:
  #  - chain-authelia
  #  - chain-basic-auth
  #  - chain-no-auth
  tls:
    store:
      name: default
