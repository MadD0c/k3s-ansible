---

- name: Install Docker Dependencies
  apt:
    pkg:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg-agent
      - software-properties-common
    update_cache: yes
    state: present

- name: Add Docker Repository
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- apt_repository: Add Docker Repository
    repo: deb https://download.docker.com/linux/ubuntu focal stable
    state: present

- name: Install Docker
  apt:
    pkg:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    update_cache: yes
    state: present

- name: Ensure docker group exists
  group:
    name: docker
    state: present

- name: Add ansible to docker group
  user:
    name: ansible
    groups: docker
    append: yes
