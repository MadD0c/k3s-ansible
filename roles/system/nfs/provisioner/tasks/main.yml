---
- name: Copy over helm deploy file
  template:
    src: nfs-provisioner-helm.yaml
    dest: "{{ remote_tmp }}/nfs-provisioner-helm.yaml"

- name: Install nfs-provisioner from helm
  k8s:
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    src: "{{ remote_tmp }}/nfs-provisioner-helm.yaml"

- name: Deploy nfs provisioner
  community.kubernetes.helm:
    name: nfs-provisioner
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    chart_ref: stable/nfs-client-provisioner
    chart_version: 1.2.9
    release_namespace: kube-system
    update_repo_cache: yes
    
   
