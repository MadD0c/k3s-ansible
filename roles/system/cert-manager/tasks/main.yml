---

#- name: Install cert-manager crds
#  shell: "kubectl apply --validate=false -f https://github.com/jetstack/cert-manager/releases/download/v1.0.2/cert-manager.yaml"

- name: Wait for installation to complete
  shell: "kubectl wait --namespace=cert-manager --for=condition=Ready pods --all --timeout=600s"
  register: cert_manager_ready

- name: Copy over clusterIssuer files
  template:
    src: "{{ item }}"
    dest: "{{ remote_tmp }}/{{ item }}"
  with_items:
    - prod-clusterissuer.yaml
    - staging-clusterissuer.yaml
    - do-secrets.yaml
  when: cert_manager_ready == 1

- name: Import secret
  k8s:
    state: present
    namespace: cert-manager
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    src: "{{ remote_tmp }}/do-secrets.yaml"

- name: Remove secret file
  file:
    path: "{{ remote_tmp }}/do-secrets.yaml"
    state: absent
    
- name: Creating Certificate Issuers
  k8s:
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    src: "{{ remote_tmp }}/{{ item }}"
  with_items:
    - prod-clusterissuer.yaml
    - staging-clusterissuer.yaml
