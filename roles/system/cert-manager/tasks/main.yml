---
- name: Copy over helm deploy file
  template:
    src: cert-manager-helm.yaml
    dest: "{{ temp_dir }}/cert-manager-helm.yaml"

- name: Install cert-manager crds
  shell: "kubectl apply --validate=false -f {{ cert_manager_crds_url }}"

- name: Install cert-manager from helm
  k8s:
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    src: "{{ temp_dir }}/cert-manager-helm.yaml"

- name: Copy over clusterIssuer files
  template:
    src: "{{ item }}"
    dest: "{{ temp_dir }}/{{ item }}"
  with_items:
    - prod-clusterissuer.yaml
    - staging-clusterissuer.yaml
    - tslstore.yaml
    - do-secrets.yaml

- name: Import secret
  k8s:
    state: present
    namespace: cert-manager
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    src: "{{ temp_dir }}/do-secrets.yaml"

- name: Remove secret file
  file:
    path: "{{ temp_dir }}/do-secrets.yaml"
    state: absent
    
- name: Creating clusterIssuer
  k8s:
    state: present
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    src: "{{ temp_dir }}/{{ item }}"
  with_items:
    - prod-clusterissuer.yaml
    - staging-clusterissuer.yaml
    #- tslstore.yaml
