---

- name: Copy over Production Cert file
  template:
    src: "{{ item }}"
    dest: "{{ remote_tmp }}/get_cert.yml"
  with_items:
    - prod-cert.yaml
  when: 
    - get_cert == "yes"
    - cert_type == "prod"
    
- name: Copy over staging Cert file
  template:
    src: "{{ item }}"
    dest: "{{ remote_tmp }}/get_cert.yml"
  with_items:
    - staging-cert.yaml
  when: 
    - get_cert == "yes"
    - cert_type == "staging"
